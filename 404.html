<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Security Breach | Stackly Defensive System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Urbanist:wght@700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { overflow: hidden; background: #080809; }
        
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.15;
        }

        .hero-404 {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .glitch-wrapper {
            position: relative;
            display: inline-block;
        }

        .error-num {
            font-size: 15rem;
            font-weight: 900;
            line-height: 0.8;
            font-family: 'Urbanist', sans-serif;
            color: #fff;
            text-shadow: 0 0 20px rgba(189, 85, 242, 0.5);
            letter-spacing: -10px;
            position: relative;
        }

        .error-num::before, .error-num::after {
            content: "404";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #080809;
        }

        .error-num::before {
            left: 2px;
            text-shadow: -2px 0 #BD55F2;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        .error-num::after {
            left: -2px;
            text-shadow: -2px 0 #00f2ff;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(31px, 9999px, 94px, 0); }
            5% { clip: rect(70px, 9999px, 71px, 0); }
            10% { clip: rect(80px, 9999px, 12px, 0); }
            15% { clip: rect(25px, 9999px, 96px, 0); }
            /* ... more steps for a smoother glitch ... */
            100% { clip: rect(67px, 9999px, 34px, 0); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(67px, 9999px, 34px, 0); }
            100% { clip: rect(31px, 9999px, 94px, 0); }
        }

        .status-badge {
            background: rgba(255, 77, 77, 0.1);
            color: #ff4d4d;
            border: 1px solid rgba(255, 77, 77, 0.2);
            padding: 8px 16px;
            border-radius: 50px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .status-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #ff4d4d;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff4d4d;
            animation: blink 1s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .terminal-container {
            max-width: 600px;
            width: 90%;
            margin-top: 40px;
            background: rgba(13, 13, 14, 0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            text-align: left;
            backdrop-filter: blur(10px);
        }

        .terminal-header {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 15px;
            display: flex;
            gap: 8px;
        }

        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot.red { background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }

        .terminal-body {
            padding: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: #8b8b94;
        }

        .typing-text {
            color: #BD55F2;
            border-right: 2px solid #BD55F2;
            animation: caret 1s infinite steps(1);
        }

        @keyframes caret { 50% { border-color: transparent; } }

        .back-btn {
            margin-top: 50px;
            padding: 18px 45px;
            font-size: 1.1rem;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .back-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .back-btn:hover::after { left: 100%; }

        .error-actions {
            display: flex;
            gap: 25px;
            justify-content: center;
            align-items: center;
            margin-top: 50px;
        }

        .error-actions .back-btn { margin-top: 0; }

        @media (max-width: 768px) {
            .error-num { font-size: 8rem; }
            .section-title { font-size: 2rem; }
            .error-actions { flex-direction: column; width: 100%; gap: 15px; }
            .back-btn { width: 100%; padding: 18px 30px; }
        }

        @media (max-width: 480px) {
            .error-num { font-size: 6rem; }
            .section-title { font-size: 1.6rem; }
        }

    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>

    <main class="hero-404">
        <div class="status-badge reveal">System Failure: Resource Missing</div>
        <div class="glitch-wrapper reveal" style="transition-delay: 0.1s;">
            <div class="error-num">404</div>
        </div>
        <h1 class="section-title reveal" style="transition-delay: 0.2s;">Secure Perimeter <span>Breached</span></h1>
        <p class="section-desc reveal" style="max-width: 600px; transition-delay: 0.3s;">The encrypted asset you are attempting to access does not exist in our active sector. Our SOC has dynamic-routed your request to this containment unit.</p>
        <div class="error-actions reveal" style="transition-delay: 0.5s;">
            <a href="index.html" class="btn btn-primary back-btn">Back To Home</a>
            <a href="javascript:history.back()" class="btn btn-primary back-btn">Go back</a>
        </div>
    </main>


    <script src="main.js"></script>
    <script>
        // Matrix Rain Effect
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const katakana = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズヅブプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン';
        const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const nums = '0123456789';
        const alphabet = katakana + latin + nums;

        const fontSize = 16;
        const columns = canvas.width / fontSize;

        const rainDrops = [];

        for( let x = 0; x < columns; x++ ) {
            rainDrops[x] = 1;
        }

        const draw = () => {
            ctx.fillStyle = 'rgba(8, 8, 9, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#BD55F2';
            ctx.font = fontSize + 'px monospace';

            for(let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                if(rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975){
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        };

        setInterval(draw, 30);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
