<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Log In | Stackly Defense</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700;900&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #080b12;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
            font-family: 'Inter', sans-serif;
        }

        .login-card {
            background: #0f172a;
            width: 100%;
            max-width: 440px;
            padding: 50px 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            text-align: left;
        }

        .logo-box {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-box img {
            height: 52px;
            filter: drop-shadow(0 0 15px rgba(184, 21, 199, 0.4));
            transition: transform 0.3s ease;
        }

        .logo-box img:hover {
            transform: scale(1.05);
        }

        .login-title {
            text-align: center;
            font-family: 'Urbanist', sans-serif;
            font-size: 32px;
            color: #fff;
            margin-bottom: 35px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .form-label {
            display: block;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        /* Styled Select */
        .select-container {
            position: relative;
            margin-bottom: 25px;
        }

        .styled-select {
            width: 100%;
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 20px;
            padding-right: 45px;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            appearance: none;
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .styled-select:focus {
            border-color: #b815c7;
            box-shadow: 0 0 15px rgba(184, 21, 199, 0.2);
        }

        .styled-select option {
            background-color: #0f172a;
            color: #fff;
            padding: 15px;
        }


        .select-container::after {
            content: '\f107';
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #b815c7;
            font-size: 16px;
            pointer-events: none;
            transition: 0.3s;
        }

        /* Inputs */
        .input-box {
            width: 100%;
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 20px;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-box:focus {
            border-color: #b815c7;
            background: rgba(184, 21, 199, 0.05);
            box-shadow: 0 0 15px rgba(184, 21, 199, 0.2);
        }

        .input-box::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            font-size: 14px;
            margin-bottom: 40px;
        }

        .password-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 25px;
        }

        .password-wrapper .input-box {
            margin-bottom: 0;
            padding-right: 50px;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
        }

        .password-toggle:hover {
            color: #b815c7;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.8);
            user-select: none;
        }

        .remember-me input {
            accent-color: #b815c7;
            width: 16px;
            height: 16px;
        }

        .forgot-pass {
            color: #b815c7;
            text-decoration: none;
        }

        /* Action Button */
        .action-btn {
            width: 100%;
            background: transparent;
            border: 1.5px solid #b815c7;
            color: #b815c7;
            padding: 14px;
            border-radius: 8px;
            font-family: 'Urbanist', sans-serif;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 2.5px;
            transition: 0.3s;
            margin-bottom: 30px;
        }

        .action-btn:hover {
            background: rgba(0, 242, 255, 0.05);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.15);
        }

        .bottom-nav {
            text-align: center;
            color: #fff;
            font-size: 14px;
        }

        .bottom-nav a {
            color: #b815c7;
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 480px) {
            body {
                padding: 20px 15px;
            }

            .login-card {
                padding: 35px 25px;
            }

            .login-title {
                font-size: 26px;
                margin-bottom: 30px;
            }

            .form-footer {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .action-btn {
                font-size: 16px;
                letter-spacing: 1.5px;
            }
        }
    </style>
</head>

<body>
    <div class="glow-bg"></div>

    <div class="login-card reveal">
        <div class="logo-box">
            <img src="./asset/white.webp" alt="Stackly">
        </div>
        <h1 class="login-title">Secure Log In</h1>

        <form id="login-form">
            <label class="form-label">Log In As</label>
            <div class="select-container">
                <select class="styled-select">
                    <option>Corporate Client</option>
                    <option>Enterprise Partner</option>
                </select>
            </div>

            <label class="form-label">Email</label>
            <input type="email" class="input-box" placeholder="user@domain.com" required>

            <label class="form-label">Password</label>
            <div class="password-wrapper">
                <input type="password" class="input-box" placeholder="********" required>
                <span class="password-toggle" aria-label="Show password"><i class="fa-solid fa-eye"></i></span>
            </div>

            <div class="form-footer">
                <label class="remember-me">
                    <input type="checkbox"> Remember me
                </label>
                <a href="404.html" class="forgot-pass">Forgot password?</a>
            </div>

            <button type="submit" class="action-btn">Log In</button>
            <div class="form-message"></div>
        </form>

        <div class="bottom-nav">
            New user? <a href="./signup.html">Create account</a>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        document.querySelectorAll('.password-toggle').forEach(toggle => {
            toggle.addEventListener('click', () => {
                const input = toggle.previousElementSibling;
                const isPassword = input.type === 'password';
                input.type = isPassword ? 'text' : 'password';
                toggle.innerHTML = `<i class="fa-solid ${isPassword ? 'fa-eye-slash' : 'fa-eye'}"></i>`;
            });
        });

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const form = e.target;
            const roleSelect = form.querySelector('.styled-select');
            const emailInput = form.querySelector('input[type="email"]');
            const passwordInput = form.querySelector('input[type="password"]');
            const message = form.querySelector('.form-message');
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
            const emailValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

            if (!email) {
                message.textContent = 'Please enter your email address.';
                message.className = 'form-message error';
                emailInput.focus();
                return;
            }
            if (!emailValid) {
                message.textContent = 'Please enter a valid email address.';
                message.className = 'form-message error';
                emailInput.focus();
                return;
            }
            if (!password) {
                message.textContent = 'Please enter your password.';
                message.className = 'form-message error';
                passwordInput.focus();
                return;
            }

            message.textContent = 'Authenticating...';
            message.className = 'form-message success';
            const btn = form.querySelector('.action-btn');
            btn.disabled = true;
            btn.innerText = 'AUTHENTICATING...';

            setTimeout(() => {
                const role = roleSelect.value;
                const redirectUrl = role === 'Enterprise Partner' ? 'dashboard-1.html' : 'dashborad.html';
                
                btn.innerText = 'ACCESS GRANTED';
                btn.style.borderColor = '#2ecc71';
                btn.style.color = '#2ecc71';
                message.textContent = `Login successful as ${role}. Redirecting...`;
                message.className = 'form-message success';
                setTimeout(() => window.location.href = redirectUrl, 1000);
            }, 1200);
        });
    </script>
</body>

</html>
